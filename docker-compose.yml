services:
  # Structured Data & PGVector for LlamaIndex vector storage
  postgres:
    image: pgvector/pgvector:pg16
    container_name: turiya-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: turiya_memory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres -c shared_buffers=256MB -c effective_cache_size=1GB -c work_mem=16MB -c maintenance_work_mem=128MB
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d turiya_memory" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Graph Database for LlamaIndex PropertyGraphIndex (Memgraph)
  memgraph-rag:
    image: memgraph/memgraph:latest
    container_name: turiya-memgraph-rag
    restart: unless-stopped
    ports:
      - "7689:7687"
    volumes:
      - memgraph_rag_data:/var/lib/memgraph
    healthcheck:
      test: [ "CMD-SHELL", "echo 'RETURN 1;' | mgconsole || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  # Semantic Cache for repeated LLM queries
  redis:
    image: redis:7-alpine
    container_name: turiya-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Local LLM Server tuned for RTX 5090
  ollama:
    image: ollama/ollama:latest
    container_name: turiya-ollama
    restart: unless-stopped
    environment:
      - OLLAMA_ORIGINS=*
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KEEP_ALIVE=10m
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

  # Init Service: Pulls required models after Ollama is healthy
  ollama-init:
    image: curlimages/curl:latest
    container_name: turiya-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        echo 'Waiting for Ollama API to be fully responsive...'
        until curl -s http://ollama:11434/api/tags > /dev/null; do
          sleep 2
        done

        # Models required by Nexus RAG (reranker runs as separate service, not via Ollama)
        MODELS="nomic-embed-text qwen2.5:3b"

        for MODEL in $$MODELS; do
          echo "Processing model: $$MODEL"
          curl -sf -X POST http://ollama:11434/api/pull -d "{\"name\":\"$$MODEL\"}"
          echo "Finished pulling $$MODEL"
        done
        echo 'All models initialized successfully.'

volumes:
  postgres_data:
  memgraph_rag_data:
  redis_data:
  ollama_data:
